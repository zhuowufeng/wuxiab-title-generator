<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>江湖称号生成�?/title>
<style>
/* ===== 基础 ===== */
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family: 'PingFang SC','Microsoft YaHei','Noto Serif SC',serif;
  min-height:100vh;
  background:#1a1410;
  overflow-x:hidden;
  color:#e8d5b8;
}

/* ===== 背景水墨效果 ===== */
.bg-layer{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:-1;
  background:
    radial-gradient(ellipse at 20% 30%, rgba(60,40,20,0.6) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 70%, rgba(30,20,60,0.4) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(40,25,15,0.8) 0%, #1a1410 100%);
}
.ink-splash{
  position:fixed;border-radius:50%;pointer-events:none;z-index:-1;
  opacity:0.06;filter:blur(60px);
}
.ink-splash:nth-child(1){
  width:400px;height:400px;top:-100px;right:-100px;
  background:radial-gradient(circle,#8b7355,transparent);
  animation:float1 20s ease-in-out infinite;
}
.ink-splash:nth-child(2){
  width:300px;height:300px;bottom:50px;left:-80px;
  background:radial-gradient(circle,#5c4033,transparent);
  animation:float2 25s ease-in-out infinite;
}
.ink-splash:nth-child(3){
  width:200px;height:200px;top:40%;left:60%;
  background:radial-gradient(circle,#4a3728,transparent);
  animation:float3 18s ease-in-out infinite;
}

@keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,30px)}}
@keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-40px)}}
@keyframes float3{0%,100%{transform:translate(0,0)}50%{transform:translate(-20px,20px)}}

/* ===== 粒子 ===== */
.particle-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:-1}
.particle{position:absolute;width:3px;height:3px;background:rgba(232,213,184,0.3);border-radius:50%;animation:drift linear infinite}
@keyframes drift{0%{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh) rotate(360deg);opacity:0}}

/* ===== 主容�?===== */
.container{max-width:520px;margin:0 auto;padding:20px 16px 40px;position:relative}

/* ===== 头部 ===== */
.header{text-align:center;padding:30px 0 10px}
.header .icon{font-size:48px;display:block;margin-bottom:8px}
.header h1{
  font-size:32px;font-weight:700;
  background:linear-gradient(135deg,#e8d5b8,#c9a96e,#e8d5b8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-shadow:none;letter-spacing:6px;
}
.header .sub{
  font-size:14px;color:#9a8a78;margin-top:8px;letter-spacing:2px;
}
.header .sub span{display:inline-block;margin:0 8px}

/* ===== 输入�?===== */
.input-section{
  background:linear-gradient(135deg,rgba(40,30,20,0.9),rgba(30,22,15,0.9));
  border:1px solid rgba(200,170,120,0.15);
  border-radius:16px;padding:24px;margin:20px 0;
  backdrop-filter:blur(10px);
}
.input-section .hint{font-size:13px;color:#9a8a78;margin-bottom:12px;text-align:center}

.name-input-wrap{
  display:flex;gap:10px;
}
.name-input-wrap input{
  flex:1;padding:14px 18px;font-size:17px;font-family:inherit;
  background:rgba(26,20,16,0.8);border:1px solid rgba(200,170,120,0.2);
  border-radius:12px;color:#e8d5b8;outline:none;transition:.3s;
}
.name-input-wrap input::placeholder{color:#6a5a4a}
.name-input-wrap input:focus{border-color:rgba(200,170,120,0.5);box-shadow:0 0 20px rgba(200,170,120,0.08)}

/* ===== 风格选择 ===== */
.style-select{display:flex;gap:8px;margin:14px 0}
.style-btn{
  flex:1;padding:10px;border:1px solid rgba(200,170,120,0.15);
  border-radius:10px;background:rgba(26,20,16,0.6);color:#9a8a78;
  font-size:14px;font-family:inherit;cursor:pointer;transition:.3s;text-align:center;
}
.style-btn.active{background:rgba(200,170,120,0.12);border-color:rgba(200,170,120,0.4);color:#e8d5b8}
.style-btn:hover{background:rgba(200,170,120,0.08)}

/* ===== 生成按钮 ===== */
.btn-generate{
  width:100%;padding:16px;border:none;border-radius:12px;
  background:linear-gradient(135deg,#8b6914,#c9a96e,#8b6914);
  color:#1a1410;font-size:18px;font-weight:700;font-family:inherit;
  cursor:pointer;transition:.3s;letter-spacing:4px;position:relative;overflow:hidden;
}
.btn-generate:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(201,169,110,0.2)}
.btn-generate:active{transform:scale(0.98)}
.btn-generate:disabled{opacity:0.5;cursor:not-allowed;transform:none}

/* ===== 加载 ===== */
.loading{display:none;text-align:center;padding:30px 0}
.loading.show{display:block}
.loading .spinner{
  width:48px;height:48px;border:3px solid rgba(200,170,120,0.1);
  border-top-color:#c9a96e;border-radius:50%;animation:spin 1s linear infinite;
  margin:0 auto 12px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading .text{font-size:14px;color:#9a8a78}

/* ===== 结果卡片 ===== */
.result-section{display:none;margin-top:20px}
.result-section.show{display:block;animation:fadeUp .5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.card{
  position:relative;
  background:linear-gradient(180deg,#f5ecd7 0%,#e8dcc8 40%,#d4c4a8 100%);
  border-radius:12px;padding:40px 24px 30px;
  text-align:center;overflow:hidden;color:#2c1810;
  box-shadow:0 10px 40px rgba(0,0,0,0.3);
  cursor:pointer;transition:.3s;
}
.card:hover{transform:translateY(-2px);box-shadow:0 15px 50px rgba(0,0,0,0.4)}

/* 卡片装饰 */
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,#8b6914,#c9a96e,#d4a84a,#c9a96e,#8b6914);
}
.card::after{
  content:'';position:absolute;top:12px;left:12px;right:12px;bottom:12px;
  border:1px solid rgba(139,105,20,0.15);border-radius:8px;pointer-events:none;
}

/* 水墨装饰纹理 */
.card .texture{
  position:absolute;top:0;left:0;width:100%;height:100%;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(139,105,20,0.03) 0%, transparent 50%),
    radial-gradient(circle at 80% 60%, rgba(139,105,20,0.02) 0%, transparent 40%);
  pointer-events:none;
}

.card .card-icon{font-size:32px;position:relative;z-index:1}
.card .card-title{
  font-size:28px;font-weight:700;margin:12px 0 6px;position:relative;z-index:1;
  letter-spacing:4px;line-height:1.4;
}
.card .card-name{
  font-size:22px;font-weight:600;color:#5c4033;margin-bottom:14px;position:relative;z-index:1;
  letter-spacing:2px;
}
.card .divider{
  width:120px;height:1px;margin:0 auto 14px;
  background:linear-gradient(90deg,transparent,rgba(92,64,51,0.4),transparent);
  position:relative;z-index:1;
}
.card .card-rank{
  font-size:15px;color:#7a5a40;margin-bottom:8px;position:relative;z-index:1;
  letter-spacing:1px;
}
.card .card-detail{
  font-size:13px;color:#8a7a6a;line-height:1.6;position:relative;z-index:1;
  max-width:280px;margin:0 auto;
}

/* 印章装饰 */
.card .seal{
  position:absolute;bottom:20px;right:20px;
  width:50px;height:50px;border:2px solid #8b3a3a;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transform:rotate(15deg);opacity:0.6;
  font-size:11px;color:#8b3a3a;font-weight:700;letter-spacing:1px;
  z-index:1;font-family:serif;
}

/* 水印 */
.card .watermark{
  position:absolute;bottom:30px;left:50%;transform:translateX(-50%);
  font-size:10px;color:rgba(92,64,51,0.2);letter-spacing:2px;z-index:1;
}

/* ===== 操作按钮 ===== */
.actions{display:flex;gap:10px;margin-top:16px}
.actions button{
  flex:1;padding:12px;border:1px solid rgba(200,170,120,0.2);
  border-radius:10px;background:rgba(40,30,20,0.8);color:#c9a96e;
  font-size:14px;font-family:inherit;cursor:pointer;transition:.3s;text-align:center;
}
.actions button:hover{background:rgba(200,170,120,0.1)}
.actions button:active{transform:scale(0.97)}

/* ===== 底部 ===== */
.footer{text-align:center;padding:30px 0 10px;font-size:12px;color:#6a5a4a}
.footer a{color:#8b7a6a;text-decoration:none}

/* ===== Toast ===== */
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);
  background:rgba(40,30,20,0.95);color:#e8d5b8;padding:12px 24px;border-radius:10px;
  font-size:14px;opacity:0;transition:.3s;pointer-events:none;z-index:100;
  border:1px solid rgba(200,170,120,0.15);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== 响应�?===== */
@media(max-width:480px){
  .header h1{font-size:26px;letter-spacing:4px}
  .container{padding:16px 12px 30px}
  .input-section{padding:18px}
  .card{padding:30px 18px 24px}
  .card .card-title{font-size:22px}
  .card .card-name{font-size:18px}
}
</style>
</head>
<body>

<div class="bg-layer">
  <div class="ink-splash"></div>
  <div class="ink-splash"></div>
  <div class="ink-splash"></div>
</div>

<div class="particle-container" id="particles"></div>

<div class="container">
  <!-- 头部 -->
  <div class="header">
    <span class="icon">🗡�?/span>
    <h1>江湖称号</h1>
    <p class="sub"><span>�?/span> 输入你的名字 · 测你的江湖称�?<span>�?/span></p>
  </div>

  <!-- 输入�?-->
  <div class="input-section">
    <p class="hint">✍️ 输入姓名，AI 为你生成独一无二的江湖称�?/p>
    
    <div class="name-input-wrap">
      <input type="text" id="nameInput" placeholder="输入你的名字..." maxlength="10" autocomplete="off">
    </div>

    <div class="style-select">
      <button class="style-btn active" data-style="武侠">🗡�?武侠�?/button>
      <button class="style-btn" data-style="修仙">�?修仙�?/button>
    </div>

    <button class="btn-generate" id="btnGenerate" onclick="generate()">
      生成我的江湖称号
    </button>
  </div>

  <!-- 加载 -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="text">正在为你推演天机 ...</div>
  </div>

  <!-- 结果 -->
  <div class="result-section" id="resultSection">
    <div class="card" id="resultCard">
      <div class="texture"></div>
      <div class="card-icon">⚔️</div>
      <div class="card-title" id="cardTitle">「一剑霜寒十四州�?/div>
      <div class="card-name" id="cardName">—�?张三</div>
      <div class="divider"></div>
      <div class="card-rank" id="cardRank">🌟 一代宗�?/div>
      <div class="card-detail" id="cardDetail">剑法通神，名动天下，武林中无人不知无人不�?/div>
      <div class="seal">江湖<br>�?/div>
      <div class="watermark">jianghu.app</div>
    </div>

    <div class="actions">
      <button onclick="copyTitle()">📋 复制称号</button>
      <button onclick="downloadCard()">💾 保存卡片</button>
      <button onclick="generate()">🔄 再算一�?/button>
    </div>
  </div>

  <!-- 底部 -->
  <div class="footer">
    测一测你的江湖称�?· 分享给朋友一起来�?🎯
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== 粒子背景 =====
(function(){
  const c = document.getElementById('particles');
  for(let i=0;i<20;i++){
    const p = document.createElement('div');
    p.className='particle';
    p.style.left=Math.random()*100+'%';
    p.style.width=p.style.height=(1+Math.random()*2)+'px';
    p.style.animationDuration=(8+Math.random()*15)+'s';
    p.style.animationDelay=(Math.random()*10)+'s';
    c.appendChild(p);
  }
})();

// ===== 风格选择 =====
document.querySelectorAll('.style-btn').forEach(btn => {
  btn.onclick = function(){
    document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
  };
});

// ===== 回车键触�?=====
document.getElementById('nameInput').onkeydown = function(e){
  if(e.key === 'Enter') generate();
};

// ===== Toast =====
let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ===== 生成 =====
async function generate(){
  const name = document.getElementById('nameInput').value.trim();
  if(!name){ showToast('请先输入你的名字�?); return; }
  
  const style = document.querySelector('.style-btn.active').dataset.style;
  const btn = document.getElementById('btnGenerate');
  const loading = document.getElementById('loading');
  const result = document.getElementById('resultSection');
  
  btn.disabled = true;
  btn.textContent = '推演�?...';
  result.classList.remove('show');
  loading.classList.add('show');
  
  try{
    const resp = await fetch('/api/generate', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name, style})
    });
    const data = await resp.json();
    if(data.error){ showToast(data.error); return; }
    
    // 填充结果
    document.getElementById('cardTitle').textContent = data.full_title || `�?{data.title}」`;
    document.getElementById('cardName').textContent = `—�?${data.name}`;
    document.getElementById('cardRank').textContent = `🌟 ${data.rank || '江湖新秀'}`;
    document.getElementById('cardDetail').textContent = data.detail || '';
    
    // 切换图标
    document.querySelector('.card-icon').textContent = data.style === '修仙' ? '�? : '⚔️';
    
    // 大号字体长标�?    const titleEl = document.getElementById('cardTitle');
    titleEl.style.fontSize = (data.full_title && data.full_title.length > 12) ? '22px' : '28px';
    
    loading.classList.remove('show');
    result.classList.add('show');
    
  } catch(e){
    showToast('网络出问题了，再试试�?);
    loading.classList.remove('show');
  } finally {
    btn.disabled = false;
    btn.textContent = '生成我的江湖称号';
  }
}

// ===== 复制称号 =====
async function copyTitle(){
  const text = document.getElementById('cardTitle').textContent + ' ' + 
               document.getElementById('cardName').textContent;
  try{
    await navigator.clipboard.writeText(text);
    showToast('�?已复制！快去分享给朋友吧');
  } catch {
    showToast('复制失败，请手动复制');
  }
}

// ===== 下载卡片 =====
function downloadCard(){
  showToast('📸 请截图保存卡片（右键→另存为�?);
}

// ===== 初始焦点 =====
document.getElementById('nameInput').focus();
</script>
</body>
</html>
